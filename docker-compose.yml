version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: infratrust_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: infratrust_db
    ports:
      - "5432:5432"
    volumes:
      # Persist database data
      - pgdata:/var/lib/postgresql/data
      # Automatically run schema.sql on database initialization
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infratrust_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infratrust_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Connect to the 'db' service using Docker's internal DNS
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - DB_NAME=infratrust_db
      - JWT_SECRET=supersecretkey_for_docker_environment
      - JWT_EXPIRES_IN=24h
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
